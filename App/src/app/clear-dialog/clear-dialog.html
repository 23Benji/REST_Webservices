<h2 mat-dialog-title>Alle Filme löschen</h2>

<mat-dialog-content>
  <p>Sollen all Ihre Filme gelöscht werden?</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Abbrechen</button>
  <button mat-raised-button color="warn" (click)="confirm()">Löschen</button>
</mat-dialog-actions>
