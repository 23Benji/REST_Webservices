<div class="dialog-header center warning">
  <div class="icon-circle">
    <mat-icon>warning</mat-icon>
  </div>
  <h2 mat-dialog-title>Alle Filme löschen</h2>
</div>

<mat-dialog-content class="center-content">
  <p>Sollen all Ihre Filme gelöscht werden?</p>
  <p class="sub-warning">Dieser Vorgang kann nicht rückgängig gemacht werden.</p>
</mat-dialog-content>

<mat-dialog-actions align="center" class="dialog-footer">
  <button mat-button class="text-muted" (click)="cancel()">Abbrechen</button>
  <button mat-flat-button class="action-btn danger-solid" (click)="confirm()">Löschen</button>
</mat-dialog-actions>
