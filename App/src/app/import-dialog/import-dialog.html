<div class="dialog-header center">
  <div class="icon-circle">
    <mat-icon>cloud_upload</mat-icon>
  </div>
  <h2 mat-dialog-title>Filme importieren</h2>
</div>

<mat-dialog-content>
  <div class="upload-zone" (click)="fileInput.click()" [class.has-file]="selectedFile">
    <mat-icon class="upload-icon">{{ selectedFile ? 'task' : 'note_add' }}</mat-icon>
    <div class="upload-text">
      <span *ngIf="!selectedFile">Klicken, um .txt oder .json Datei auszuwählen</span>
      <span *ngIf="selectedFile" class="file-name">{{ selectedFile.name }}</span>
    </div>
    <input hidden (change)="onFileSelected($event)" #fileInput type="file" accept=".txt,.json">
  </div>
</mat-dialog-content>

<mat-dialog-actions align="center" class="dialog-footer">
  <button mat-button class="text-muted" (click)="cancel()">Abbrechen</button>
  <button mat-flat-button class="action-btn primary" [disabled]="!selectedFile"
    (click)="importFile()">Importieren</button>
</mat-dialog-actions>
