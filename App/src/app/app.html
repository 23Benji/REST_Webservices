<header class="premium-header">
  <div class="brand">
    <mat-icon class="brand-icon">movie_filter</mat-icon>
    <span class="brand-text">MOVIE<span class="accent">.</span>PRO</span>
  </div>

  <div class="spacer"></div>

  <div class="nav-actions">
    <div class="user-chip" *ngIf="authService.isLoggedIn()">
      <mat-icon>person</mat-icon>
      <span>{{ authService.getCurrentUser() }}</span>
    </div>

    <button mat-icon-button class="nav-btn" *ngIf="authService.isLoggedIn()" (click)="openAddDialog()"
      title="Neuer Film">
      <mat-icon>add</mat-icon>
    </button>
    <button mat-icon-button class="nav-btn" *ngIf="authService.isLoggedIn()" (click)="openImportDialog()"
      title="Importieren">
      <mat-icon>file_upload</mat-icon>
    </button>
    <button mat-icon-button class="nav-btn danger" *ngIf="authService.isLoggedIn()" (click)="openClearDialog()"
      title="Alle löschen">
      <mat-icon>delete_sweep</mat-icon>
    </button>

    <div class="divider" *ngIf="authService.isLoggedIn()"></div>

    <button mat-icon-button class="nav-btn logout" *ngIf="authService.isLoggedIn()" (click)="logout()" title="Logout">
      <mat-icon>power_settings_new</mat-icon>
    </button>

    <button mat-flat-button class="login-btn" *ngIf="!authService.isLoggedIn()" (click)="openLogin()">
      Login
    </button>
  </div>
</header>

<main class="main-content">
  <app-movie-list></app-movie-list>
</main>
