<h2 mat-dialog-title>Login</h2>

<mat-dialog-content>
  <p *ngIf="errorMessage" style="color: red;">{{errorMessage}}</p>

  <mat-form-field appearance="fill" style="width: 100%; margin-top: 10px;">
    <mat-label>Benutzername</mat-label>
    <input matInput [(ngModel)]="username" name="username">
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%;">
    <mat-label>Passwort</mat-label>
    <input matInput type="password" [(ngModel)]="password" name="password">
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Abbrechen</button>
  <button mat-raised-button color="primary" (click)="login()" [disabled]="!username || !password">Login</button>
</mat-dialog-actions>
