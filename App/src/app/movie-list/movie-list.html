<div class="view-header">
  <div class="sort-controls">
    <button class="sort-btn" (click)="loadMovies('asc')" [class.active]="currentSort === 'asc'">
      <mat-icon>arrow_downward</mat-icon> A-Z
    </button>
    <button class="sort-btn" (click)="loadMovies('desc')" [class.active]="currentSort === 'desc'">
      <mat-icon>arrow_upward</mat-icon> Z-A
    </button>
  </div>
</div>

<div class="empty-state" *ngIf="movies.length === 0">
  <mat-icon class="empty-icon">theaters</mat-icon>
  <h2>Keine Filme gefunden</h2>
  <p>Die Mediathek ist derzeit leer.</p>
</div>

<div class="movie-grid" *ngIf="movies.length > 0">
  <div class="movie-card" *ngFor="let movie of movies"
    [class.is-owner]="authService.isLoggedIn() && authService.getCurrentUser() === movie.owner">

    <div class="card-glow"></div>

    <div class="card-content">
      <div class="card-header">
        <span class="year-badge">{{ movie.year }}</span>
        <div class="status-indicator" [class.published]="movie.published"
          [title]="movie.published ? 'Öffentlich' : 'Privat'"></div>
      </div>

      <h3 class="movie-title">{{ movie.title }}</h3>

      <div class="card-footer">
        <div class="owner-info">
          <mat-icon>account_circle</mat-icon>
          <span>{{ movie.fullname }}</span>
        </div>
      </div>
    </div>

    <div class="action-layer" *ngIf="authService.isLoggedIn() && authService.getCurrentUser() === movie.owner">
      <button mat-fab class="edit-fab" color="primary" (click)="openEditDialog(movie)" title="Bearbeiten">
        <mat-icon>edit</mat-icon>
      </button>
    </div>

  </div>
</div>
