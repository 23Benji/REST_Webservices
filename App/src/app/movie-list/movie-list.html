<div style="margin-bottom: 20px;">
  <span style="margin-right: 15px; font-weight: bold;">Sortierung:</span>
  <button mat-stroked-button (click)="loadMovies('asc')" [color]="currentSort === 'asc' ? 'primary' : ''">Aufsteigend</button>
  <button mat-stroked-button (click)="loadMovies('desc')" [color]="currentSort === 'desc' ? 'primary' : ''" style="margin-left: 10px;">Absteigend</button>
</div>

<p *ngIf="movies.length === 0">Keine Filme gefunden.</p>

<div *ngFor="let movie of movies" style="margin-bottom: 15px; max-width: 600px;">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ movie.id }}. {{ movie.title }} ({{ movie.year }})</mat-card-title>
      <mat-card-subtitle>
        {{ movie.published ? 'Öffentlich' : 'Privat' }} von {{ movie.fullname }}
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-actions *ngIf="authService.isLoggedIn() && authService.getCurrentUser() === movie.owner">
      <button mat-button color="primary">Ändern</button>
      <button mat-button color="warn">Löschen</button>
    </mat-card-actions>
  </mat-card>
</div>
